version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: visia_postgres_db
    restart: always
    environment:
      # Credenciais vêm de variáveis de ambiente / .env (nunca versione senhas).
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-visia_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
services:
  app:
    build: .
    container_name: visia_app
    restart: always
    env_file:
      - .env
    environment:
      # O banco SQLite fica em /data (volume), não dentro do container efêmero.
      # Quatro barras = caminho absoluto: /data/dados.db
      DATABASE_URL: sqlite:////data/dados.db
    ports:
      - "8000:8000"
    volumes:
      # Persiste o arquivo SQLite entre recriações do container.
      - sqlite_data:/data

volumes:
  sqlite_data:
